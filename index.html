<!DOCTYPE html>
<html>
<head>
  <meta http-meta="Content-Security-Policy" content="frame-ancestors 'self' https://datastudio.google.com https://lookerstudio.google.com;">
  <style>
    html, body {
      background-color: #1e222b; /* Dark background */
      color: #92a4b8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      font-size: 14px;
      overflow: hidden; /* Tinatanggal ang scrollbar sa maliit na box */
      width: 100%;
      height: 100%;
    }
    .container {
      display: flex;
      align-items: center;
      padding-left: 5px;
    }
    .time-label {
      margin-right: 6px;
      white-space: nowrap;
    }
    .live-time {
      color: #ffcc00; /* Yellow text */
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="container">
    <span class="time-label">Philippine Standard Time:</span>
    <span id="pst-clock" class="live-time">Loading...</span>
  </div>

  <script>
    function updateClock() {
      var now = new Date();
      
      var options = { 
        timeZone: 'Asia/Manila', 
        weekday: 'short', 
        year: 'numeric', 
        month: 'short', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit', 
        hour12: true 
      };
      
      var formatter = new Intl.DateTimeFormat('en-US', options);
      var parts = formatter.formatToParts(now);
      
      var weekday = parts.find(p => p.type === 'weekday').value;
      var month = parts.find(p => p.type === 'month').value;
      var day = parts.find(p => p.type === 'day').value;
      var year = parts.find(p => p.type === 'year').value;
      var hour = parts.find(p => p.type === 'hour').value;
      var minute = parts.find(p => p.type === 'minute').value;
      var second = parts.find(p => p.type === 'second').value;
      var dayPeriod = parts.find(p => p.type === 'dayPeriod').value;
      
      var formattedString = weekday + ", " + month + " " + day + ", " + year + ", " + hour + ":" + minute + ":" + second + " " + dayPeriod + " (PST)";
      
      document.getElementById('pst-clock').innerHTML = formattedString;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
